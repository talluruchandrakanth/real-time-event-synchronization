<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Event Synchronization</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #0F172A;
      --text: #F8FAFC;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Dynamic Background */
    .bg-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
      animation: float 10s infinite alternate ease-in-out;
    }

    .circle-1 {
      width: 600px;
      height: 600px;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .circle-2 {
      width: 400px;
      height: 400px;
      bottom: 10%;
      right: -50px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
      animation-delay: -3s;
    }

    .circle-3 {
      width: 500px;
      height: 500px;
      bottom: -200px;
      left: 30%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) scale(1);
      }

      100% {
        transform: translateY(30px) scale(1.1);
      }
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 0 20px;
      z-index: 1;
      position: relative;
    }

    /* Event Grid Styles */
    .events-section {
      width: 100%;
      max-width: 1200px;
      margin-top: 60px;
      animation: fadeInUp 1s ease-out 0.9s both;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 30px;
      text-align: left;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      text-align: left;
    }

    .event-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .event-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(129, 140, 248, 0.5);
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
    }

    .event-card h3 {
      font-size: 1.5rem;
      margin: 0 0 12px 0;
      color: #F8FAFC;
    }

    .event-detail {
      margin: 8px 0;
      font-size: 0.95rem;
      color: #CBD5E1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: #34D399;
      margin-top: 16px;
    }

    .event-status {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-live {
      background: rgba(16, 185, 129, 0.2);
      color: #10B981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-scheduled {
      background: rgba(99, 102, 241, 0.2);
      color: #818CF8;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    /* Loading state */
    .loading {
      color: #94A3B8;
      font-size: 1.1rem;
      font-style: italic;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(to right, #818CF8, #C084FC, #F472B6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
      animation: fadeInDown 1s ease-out;
    }

    p {
      font-size: 1.25rem;
      color: #94A3B8;
      max-width: 600px;
      margin-bottom: 40px;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    .btn {
      display: inline-block;
      padding: 16px 40px;
      font-size: 1.125rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--primary) 0%, #818CF8 100%);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.5);
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 20px 30px -5px rgba(79, 70, 229, 0.6);
    }

    .btn:active {
      transform: translateY(1px);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    nav {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 30px 50px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeInDown 1s ease-out;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      letter-spacing: 1px;
    }

    .logo span {
      color: #818CF8;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      nav {
        padding: 20px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bg-animation">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <nav>
    <a href="/" class="logo">Event<span>Sync</span></a>
  </nav>

  <div class="container">
    <h1>Enjoy events near by you</h1>
    <p>Discover, connect, and experience the best local events happening around you in real-time. Join our community
      today.</p>

    <a href="/list-events" class="btn">Jump Into Events</a>
  </div>
</body>

</html>
