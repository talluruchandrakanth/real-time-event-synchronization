<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Engine - Login</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #0F172A;
      --text: #F8FAFC;
    }
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    /* Dynamic Background matching Home Page */
    .bg-animation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -1;
      background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 100%);
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,70,229,0.2) 0%, rgba(0,0,0,0) 70%);
      animation: float 10s infinite alternate ease-in-out;
    }
    .circle-1 { width: 600px; height: 600px; top: -100px; left: -100px; animation-delay: 0s; }
    .circle-2 { width: 400px; height: 400px; bottom: 10%; right: -50px; background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, rgba(0,0,0,0) 70%); animation-delay: -3s; }
    .circle-3 { width: 500px; height: 500px; bottom: -200px; left: 30%; background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(0,0,0,0) 70%); animation-delay: -5s; }
    
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      100% { transform: translateY(30px) scale(1.1); }
    }

    /* Glassmorphism Login Card */
    .login-wrapper {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      margin-bottom: 30px;
    }
    
    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: white;
      text-decoration: none;
      letter-spacing: 1px;
    }
    
    .logo span {
      background: linear-gradient(to right, #818CF8, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      color: #94A3B8;
      font-size: 0.95rem;
      margin-top: -5px;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      color: #CBD5E1;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-group input:focus {
      outline: none;
      border-color: #818CF8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
      background: rgba(15, 23, 42, 0.6);
    }

    .input-group input::placeholder {
      color: #64748B;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #818CF8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.6);
    }
    
    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      background: #475569;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-animation">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="logo-container">
      <div class="logo">Event<span>Engine</span></div>
    </div>
    <p class="subtitle">Welcome back! Please enter your details.</p>

    <form id="loginForm">
      <div class="input-group">
        <label for="username">Email or Username</label>
        <input type="text" id="username" placeholder="user@example.com or admin" required autocomplete="username" />
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" id="loginBtn">Sign In</button>
      <a href="/public/create-account.html" style="display: block; margin-top: 24px; color: #94A3B8; font-size: 0.9rem; text-decoration: none; transition: color 0.3s ease;" onmouseover="this.style.color='#818CF8'; this.style.textDecoration='underline';" onmouseout="this.style.color='#94A3B8'; this.style.textDecoration='none';">Don't have an account? Create one here</a>
    </form>
  </div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const loginBtn = document.getElementById("loginBtn");
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  // Disable button during request
  loginBtn.innerText = "Signing in...";
  loginBtn.disabled = true;

  try {
    const res = await fetch("/admin", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json" 
      },
      body: JSON.stringify({ username, password }),
      // CRITICAL: This allows the browser to store the session cookie from the server
      credentials: "include" 
    });

    const data = await res.json();

    if (data.success) {
      console.log("Login successful! Redirecting...");
      if (data.role === "admin") {
        window.location.replace("/"); 
      } else {
        window.location.replace("/list-events"); 
      }
    } else {
      alert("Invalid Username or Password!");
      loginBtn.innerText = "Sign In";
      loginBtn.disabled = false;
    }
  } catch (err) {
    console.error("Login Error:", err);
    alert("Connection error. Is the server running?");
    loginBtn.innerText = "Sign In";
    loginBtn.disabled = false;
  }
});
</script>

</body>
</html>
